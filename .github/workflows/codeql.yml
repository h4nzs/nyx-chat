name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Rutin cek seminggu sekali tiap Minggu malam (Bebas bisa diubah jamnya)
    - cron: '40 17 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        # Analisa script GitHub Actions lu sendiri
        - language: actions
          build-mode: none
        # Ini yang paling penting: Analisa Backend & Frontend lu
        - language: javascript-typescript
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # 🔥 FIX: Ini di-uncomment biar scan-nya lebih galak (nyari celah memori/kripto)
        queries: security-extended,security-and-quality

    # Bagian autobuild dihapus karena JS/TS build-mode nya 'none' (ga butuh compile)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
        
