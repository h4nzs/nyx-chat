name: Deploy NYX to VPS (PNPM Monorepo)

on:
  push:
    branches:
      - main # ⚠️ Pastikan ini sesuai nama branch kamu! (misal: 'main' atau 'setup-deploy')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # --- SETUP PNPM ---
      - name: 🦀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # --- PHASE 1: INSTALL SEMUA (ROOT) ---
      - name: 📦 Install Dependencies (Root)
        run: pnpm install --no-frozen-lockfile

      # --- PHASE 2: BUILD WEB ---
      - name: 🎨 Build Web (Frontend)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm --filter ./web run build

      # --- PHASE 3: BUILD SERVER ---
      - name: ⚙️ Build Server (Backend)
        working-directory: ./server
        run: |
          # Generate Prisma Client untuk proses build
          npx prisma generate
          
          # Build TypeScript
          pnpm run build

      # --- PHASE 4: PACKAGING ---
      - name: 🗜️ Prepare Artifacts for Deploy
        run: |
          mkdir deploy_package
          
          # Copy Frontend Build
          mkdir -p deploy_package/web
          cp -r web/dist deploy_package/web/
          
          # Copy Backend (TANPA node_modules, TAPI bawa Prisma yang udah di-generate)
          mkdir -p deploy_package/server
          cp -r server/dist deploy_package/server/
          cp server/package.json deploy_package/server/
          cp -r server/prisma deploy_package/server/
          
          # Zip semuanya
          cd deploy_package
          zip -r ../nyx-deploy.zip .

      # --- PHASE 5: SHIP TO VPS ---
      - name: 🚀 Upload to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "nyx-deploy.zip"
          target: "/root/"

      # --- PHASE 6: EXECUTE ON VPS (INSTALL DI RILIS BARU) ---
      - name: 🔧 Unzip & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e  # Exit on any error
            echo "🚧 Starting Deployment (Hybrid Install)..."
            
            # 1. Bikin folder rilis unik pakai timestamp
            RELEASE_DIR="/root/nyx-releases/release_$(date +%Y%m%d_%H%M%S)"
            mkdir -p $RELEASE_DIR
            
            # 2. Unzip diam-diam
            unzip -q -o /root/nyx-deploy.zip -d $RELEASE_DIR/
            rm /root/nyx-deploy.zip
            
            # 3. INSTALL DEPENDENSI DI FOLDER BARU (Aman karena PM2 masih jalan di folder lama)
            echo "📦 Installing backend dependencies..."
            cd $RELEASE_DIR/server
            # Pakai NPM biar struktur foldernya solid dan ramah ESM
            npm install --omit=dev --legacy-peer-deps --no-audit --no-fund
            
            # 4. 🛡️ ATOMIC SYMLINK SWAP
            echo "🔄 Executing Atomic Swap..."
            ln -sfn $RELEASE_DIR /root/nyx-app_tmp_link
            mv -Tf /root/nyx-app_tmp_link /root/nyx-app
            
            # 5. DEPLOY FRONTEND
            sudo mkdir -p /var/www/nyx-web
            sudo rm -rf /var/www/nyx-web/*
            sudo cp -r /root/nyx-app/web/dist/* /var/www/nyx-web/
            sudo systemctl reload nginx || true
            
            # 6. RESTART API (HARD RESTART BIAR FRESH)
            echo "🚀 Restarting PM2..."
            cd /root/nyx-app/server
            if pm2 describe nyx-api > /dev/null 2>&1; then
              pm2 reload nyx-api --update-env
            else
              pm2 start dist/index.js --name "nyx-api" -i max --node-args="--max-old-space-size=768"
            fi
            pm2 save

            # 6. BERSIH-BERSIH DISK (Simpan 3 rilis terakhir aja)
            echo "🧹 Cleaning up old releases..."
            ls -dt /root/nyx-releases/* | tail -n +4 | xargs -d '\n' rm -rf || true
            
            echo "✅ Deployment Success!"