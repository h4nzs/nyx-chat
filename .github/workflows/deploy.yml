name: Deploy NYX to VPS (PNPM Monorepo)

on:
  push:
    branches:
      - main # ⚠️ Pastikan ini sesuai nama branch kamu! (misal: 'main' atau 'setup-deploy')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # --- SETUP PNPM ---
      - name: 🦀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # --- PHASE 1: INSTALL SEMUA (ROOT) ---
      - name: 📦 Install Dependencies (Root)
        run: pnpm install --no-frozen-lockfile

      # --- PHASE 2: BUILD WEB ---
      - name: 🎨 Build Web (Frontend)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm --filter ./web run build

      # --- PHASE 3: BUILD SERVER ---
      - name: ⚙️ Build Server (Backend)
        working-directory: ./server
        run: |
          # Generate Prisma Client untuk proses build
          npx prisma generate
          
          # Build TypeScript
          pnpm run build

      # --- PHASE 4: PACKAGING ---
      - name: 🗜️ Prepare Artifacts for Deploy
        run: |
          mkdir deploy_package
          
          # Copy Frontend Build
          mkdir -p deploy_package/web
          cp -r web/dist deploy_package/web/
          
          # Copy Backend (Bawa Prisma hasil generate dari GitHub, TAPI TINGGALKAN node_modules)
          mkdir -p deploy_package/server
          cp -r server/dist deploy_package/server/
          cp server/package.json deploy_package/server/
          cp -r server/prisma deploy_package/server/
          
          cd deploy_package
          zip -r ../nyx-deploy.zip .

      # --- PHASE 5: SHIP TO VPS ---
      - name: 🚀 Upload to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "nyx-deploy.zip"
          target: "/root/"

      # --- PHASE 6: EXECUTE ON VPS (PNPM NATIVE INSTALL) ---
      - name: 🔧 Unzip & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e  # Exit on error
            echo "🚧 Starting Deployment (Hybrid PNPM Mode)..."
            
            # 1. Pastikan PNPM terinstall di VPS
            if ! command -v pnpm &> /dev/null; then
                npm install -g pnpm
            fi
            
            # 2. Bikin folder rilis
            RELEASE_DIR="/root/nyx-releases/release_$(date +%Y%m%d_%H%M%S)"
            mkdir -p $RELEASE_DIR
            
            # 3. Unzip
            unzip -q -o /root/nyx-deploy.zip -d $RELEASE_DIR/
            rm /root/nyx-deploy.zip
            
            # 4. INSTALL DI VPS PAKAI PNPM (Cepat & Hemat)
            echo "📦 Installing backend dependencies with PNPM..."
            cd $RELEASE_DIR/server
            # Batasi memory node saat install biar VPS 1GB lu nggak ngos-ngosan
            NODE_OPTIONS="--max-old-space-size=400" pnpm install --prod
            
            # 5. 🛡️ ATOMIC SYMLINK SWAP (Anti Downtime)
            echo "🔄 Executing Atomic Swap..."
            ln -sfn $RELEASE_DIR /root/nyx-app_tmp_link
            mv -Tf /root/nyx-app_tmp_link /root/nyx-app
            
            # 6. DEPLOY FRONTEND
            sudo mkdir -p /var/www/nyx-web
            sudo rm -rf /var/www/nyx-web/*
            sudo cp -r /root/nyx-app/web/dist/* /var/www/nyx-web/
            sudo systemctl reload nginx || true
            
            # 7. RESTART PM2
            echo "🚀 Restarting API..."
            cd /root/nyx-app/server
            if pm2 describe nyx-api > /dev/null 2>&1; then
              pm2 reload nyx-api --update-env
            else
              pm2 start dist/index.js --name "nyx-api" -i max --node-args="--max-old-space-size=768"
            fi
            pm2 save

            # 6. BERSIH-BERSIH DISK (Simpan 3 rilis terakhir aja)
            echo "🧹 Cleaning up old releases..."
            ls -dt /root/nyx-releases/* | tail -n +4 | xargs -d '\n' rm -rf || true
            
            echo "✅ Deployment Success!"