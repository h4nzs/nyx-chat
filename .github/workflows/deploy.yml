name: Deploy NYX to VPS (PNPM Monorepo)

on:
  push:
    branches:
      - main # ⚠️ Pastikan ini sesuai nama branch kamu! (misal: 'main' atau 'setup-deploy')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # --- SETUP PNPM ---
      - name: 🦀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # --- PHASE 1: INSTALL SEMUA (ROOT) ---
      - name: 📦 Install Dependencies (Root)
        run: pnpm install --no-frozen-lockfile

      # --- PHASE 2: BUILD WEB ---
      - name: 🎨 Build Web (Frontend)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm --filter ./web run build

      # --- PHASE 3: BUILD SERVER ---
      - name: ⚙️ Build Server (Backend)
        working-directory: ./server
        run: |
          # Generate Prisma Client (Versi 5) untuk proses build
          npx prisma generate
          
          # Build TypeScript
          pnpm run build

      # --- PHASE 4: PACKAGING ---
      - name: 🗜️ Prepare Artifacts for Deploy
        run: |
          mkdir deploy_package
          
          # Copy Frontend Build
          mkdir -p deploy_package/web
          cp -r web/dist deploy_package/web/
          
          # Copy Backend Build & Configs
          mkdir -p deploy_package/server
          cp -r server/dist deploy_package/server/
          cp server/package.json deploy_package/server/
          cp -r server/prisma deploy_package/server/
          
          # Zip semuanya
          cd deploy_package
          zip -r ../nyx-deploy.zip .

      # --- PHASE 5: SHIP TO VPS ---
      - name: 🚀 Upload to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "nyx-deploy.zip"
          target: "/root/"

      # --- PHASE 6: EXECUTE ON VPS (FIXED HERE) ---
      - name: 🔧 Unzip & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "🚧 Starting Deployment..."
            
            # Cek pnpm
            if ! command -v pnpm &> /dev/null; then
                npm install -g pnpm
            fi

            mkdir -p /root/nyx-app
            
            # Unzip
            unzip -o /root/nyx-deploy.zip -d /root/nyx-app/
            rm /root/nyx-deploy.zip
            
            # Setup Backend
            echo "📦 Installing Backend Dependencies..."
            cd /root/nyx-app/server
            
            # Install prod dependencies
            pnpm install --prod
            
            # Jalankan generate pakai binary lokal yang baru diinstall
            echo "🔧 Generating Prisma Client..."
            npx prisma generate

            # --- DEPLOY FRONTEND TO NGINX ---
            echo "🎨 Deploying Frontend to Nginx..."
            # 1. Pastikan folder tujuan ada
            sudo mkdir -p /var/www/nyx-web
            # 2. Bersihkan file lama
            sudo rm -rf /var/www/nyx-web/*
            # 3. Copy hasil build baru dari /root/ ke /var/www/
            sudo cp -r /root/nyx-app/web/dist/* /var/www/nyx-web/
            # 4. Reload Nginx biar refresh cache
            sudo systemctl reload nginx
            # ---------------------------------
            
            # Restart Apps
            echo "🔄 Restarting Apps..."
            pm2 delete nyx-api || true
            pm2 start dist/index.js --name "nyx-api" -i max --node-args="--max-old-space-size=768"
            pm2 delete nyx-web || true
            pm2 save
            
            echo "✅ Deployment Success!"