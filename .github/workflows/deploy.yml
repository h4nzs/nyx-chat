name: Deploy NYX to VPS (PNPM Monorepo)

on:
  push:
    branches:
      - main # ⚠️ Pastikan ini sesuai nama branch kamu! (misal: 'main' atau 'setup-deploy')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # --- SETUP PNPM ---
      - name: 🦀 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      # --- PHASE 1: INSTALL SEMUA (ROOT) ---
      - name: 📦 Install Dependencies (Root)
        run: pnpm install --no-frozen-lockfile

      # --- PHASE 2: BUILD WEB ---
      - name: 🎨 Build Web (Frontend)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: pnpm --filter ./web run build

      # --- PHASE 3: BUILD SERVER ---
      - name: ⚙️ Build Server (Backend)
        working-directory: ./server
        run: |
          # Generate Prisma Client untuk proses build
          npx prisma generate
          
          # Build TypeScript
          pnpm run build

      # --- PHASE 4: PACKAGING ---
      - name: 🗜️ Prepare Artifacts for Deploy
        run: |
          # 1. Install dependensi produksi di GitHub Runner
          cd server
          pnpm install --prod --no-frozen-lockfile
          npx prisma generate
          cd ..

          mkdir deploy_package
          
          # Copy Frontend Build
          mkdir -p deploy_package/web
          cp -r web/dist deploy_package/web/
          
          # Copy Backend (Include node_modules & generated prisma)
          mkdir -p deploy_package/server
          cp -r server/dist deploy_package/server/
          cp -r server/node_modules deploy_package/server/  # <--- INI KUNCINYA!
          cp server/package.json deploy_package/server/
          cp -r server/prisma deploy_package/server/
          
          # Zip semuanya
          cd deploy_package
          zip -r ../nyx-deploy.zip .

      # --- PHASE 5: SHIP TO VPS ---
      - name: 🚀 Upload to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "nyx-deploy.zip"
          target: "/root/"

      # --- PHASE 6: EXECUTE ON VPS (FIXED HERE) ---
      - name: 🔧 Unzip & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "🚧 Starting Deployment (Zero install)..."
            
            # Buat folder backup/app
            mkdir -p /root/nyx-app_new
            
            # Unzip hasil packaging dari GitHub
            unzip -o /root/nyx-deploy.zip -d /root/nyx-app_new/
            rm /root/nyx-deploy.zip
            
            # --- SWAP FOLDER (Atomic Switch) ---
            # Kita ganti folder lama dengan yang baru biar downtime minim
            rm -rf /root/nyx-app_old
            mv /root/nyx-app /root/nyx-app_old || true
            mv /root/nyx-app_new /root/nyx-app
            
            # --- DEPLOY FRONTEND ---
            sudo mkdir -p /var/www/nyx-web
            sudo rm -rf /var/www/nyx-web/*
            sudo cp -r /root/nyx-app/web/dist/* /var/www/nyx-web/
            sudo systemctl reload nginx
            
            # --- RESTART API ---
            cd /root/nyx-app/server
            pm2 delete nyx-api || true
            pm2 start dist/index.js --name "nyx-api" -i max --node-args="--max-old-space-size=768"
            pm2 save
            
            echo "✅ Deployment Success!"