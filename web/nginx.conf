# =========================================================
# 🏠 RUMAH 1: SISI PUBLIK / MARKETING (Domain Utama)
# =========================================================
server {
    listen 3000;
    server_name nyx-app.my.id;

    # Folder khusus untuk Landing Page (hasil build dari folder marketing)
    root /var/www/nyx-marketing;
    index index.html;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/javascript text/css text/plain image/svg+xml text/xml;

    set $marketing_csp "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.r2.dev https://*.cloudflarestorage.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';";

    location / {
        try_files $uri $uri.html $uri/ =404;
        
        # Header cache agar HTML selalu fresh
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Expires "0";
        
        # --- FULL SECURITY HEADERS (MARKETING) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $marketing_csp always;
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        
        # Header cache untuk aset statis marketing
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;

        # --- FULL SECURITY HEADERS (MARKETING) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $marketing_csp always;
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Powered-By "NYX-Engine" always;
    }
}

# =========================================================
# 🏛️ RUMAH 2: SISI APLIKASI UTAMA (Subdomain App)
# =========================================================
server {
    listen 3000;
    server_name app.nyx-app.my.id;

    # Folder aplikasi React utama Anda (hasil build dari folder web)
    root /var/www/nyx-web;
    index index.html;

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/javascript text/css text/plain image/svg+xml text/xml application/json;

    set $app_csp "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://cloudflareinsights.com https://*.cloudflare.com https://cdn.jsdelivr.net https://api.nyx-app.my.id; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.r2.dev https://cdn.jsdelivr.net https://*.cloudflarestorage.com https://*.nyx-app.my.id; media-src 'self' data: blob: https://*.r2.dev https://*.cloudflarestorage.com https://*.nyx-app.my.id; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: https://api.nyx-app.my.id wss://api.nyx-app.my.id https://nyx-app.my.id wss://nyx-app.my.id https://*.cloudflareinsights.com https://cloudflareinsights.com https://*.r2.dev https://*.cloudflarestorage.com https://app.nyx-app.my.id https://*.nyx-app.my.id wss://*.nyx-app.my.id; frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';";

    # 🚀 SPA ROUTING (REACT ROUTER)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Header cache HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Expires "0";

        # --- FULL SECURITY HEADERS (APP) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $app_csp always;
        
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Sec-Protocol "Double-Ratchet-Core" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    # 📦 CACHING UNTUK ASSETS REACT
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # --- FULL SECURITY HEADERS (APP) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $app_csp always;
        
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Sec-Protocol "Double-Ratchet-Core" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    # 📡 SERVICE WORKER PWA
    location ~ ^/(sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        access_log off;

        # --- FULL SECURITY HEADERS (APP) ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $app_csp always;
        
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Sec-Protocol "Double-Ratchet-Core" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    # 🔗 REVERSE PROXY UNTUK API
    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔗 REVERSE PROXY UNTUK SOCKET.IO
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}