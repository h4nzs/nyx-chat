# =========================================================
# 🏠 RUMAH 1: SISI PUBLIK / MARKETING (Domain Utama)
# =========================================================
server {
    listen 3000;
    server_name nyx-app.my.id;

    # Folder baru khusus untuk Landing Page (misal: hasil build Astro/HTML statis)
    root /var/www/nyx-marketing;
    index index.html;

    client_max_body_size 10M; # Lebih kecil karena hanya untuk publik/marketing

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/javascript text/css text/plain image/svg+xml text/xml;

    # GLOBAL SECURITY HEADERS (Disalin dari versi Anda yang sudah solid)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.r2.dev https://*.cloudflarestorage.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
    add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
    add_header X-Powered-By "NYX-Engine" always;

    location / {
        try_files $uri $uri/ /index.html;
        # Header cache untuk HTML agar selalu revalidate
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Expires "0";
        
        # (Header keamanan perlu diulang di sini sesuai aturan Nginx)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}

# =========================================================
# 🔒 RUMAH 2: SISI APLIKASI UTAMA (Subdomain App)
# =========================================================
server {
    listen 3000;
    server_name app.nyx-app.my.id;

    # Folder aplikasi React SPA Anda saat ini
    root /var/www/nyx-web;
    index index.html;

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/javascript text/css text/plain image/svg+xml text/xml application/json;

    # SPA ROUTING (REACT ROUTER)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Expires "0";

        # Masukkan kembali FULL CSP dan Header keamanan mutlak Anda di sini
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=(), usb=()" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://challenges.cloudflare.com https://static.cloudflareinsights.com https://cloudflareinsights.com https://*.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://api.dicebear.com https://*.r2.dev https://cdn.jsdelivr.net https://*.cloudflarestorage.com https://*.nyx-app.my.id; media-src 'self' data: blob: https://*.r2.dev https://*.cloudflarestorage.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: https://api.nyx-app.my.id wss://api.nyx-app.my.id https://nyx-app.my.id wss://nyx-app.my.id https://*.cloudflareinsights.com https://cloudflareinsights.com https://*.r2.dev https://*.cloudflarestorage.com https://*.nyx-app.my.id wss://*.nyx-app.my.id; frame-src 'self' https://challenges.cloudflare.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Sec-Protocol "Double-Ratchet-Core" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    # CACHING UNTUK ASSETS REACT
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # [PASTE FULL SECURITY HEADERS ANDA DI SINI SAMA SEPERTI DI ATAS]
        add_header X-Edge-Relay "nyx-enigma-v2.3.0" always;
        add_header X-Sec-Protocol "Double-Ratchet-Core" always;
        add_header X-Powered-By "NYX-Engine" always;
    }

    location ~ ^/(sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        access_log off;
        # [PASTE FULL SECURITY HEADERS ANDA DI SINI SAMA SEPERTI DI ATAS]
    }

    # 🔌 REVERSE PROXY UNTUK API & SOCKET.IO
    # Jika frontend Anda menembak ke /api (relatif path), blok ini akan meneruskannya ke backend port 4000.
    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}