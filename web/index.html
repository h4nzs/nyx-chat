<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.nyx-app.my.id">

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NYX">
    <meta name="yandex-verification" content="3926b52b86cac4aa" />

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Dark mode default background to prevent white flash */
      body { background-color: #f0f2f5; margin: 0; padding: 0; }
      @media (prefers-color-scheme: dark) {
        body { background-color: #0f172a; }
      }
      
      /* Loader Styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(134, 59, 246, 0.2); /* Blue-500 equivalent */
        border-top-color: #a23bf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loading-text {
        margin-top: 16px;
        font-family: 'Nunito', sans-serif;
        font-size: 14px;
        color: #64748b; /* Slate-500 */
        font-weight: 600;
        letter-spacing: 0.05em;
        animation: pulse 2s infinite;
      }
      @media (prefers-color-scheme: dark) {
        .loading-text { color: #94a3b8; } /* Slate-400 */
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">INITIALIZING NYX SECURE ENCLAVE...</div>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <noscript>
      <div style="padding: 2rem; text-align: center; color: #3b82f6;">
        NYX requires JavaScript to provide end-to-end encryption. Please enable it to continue 🙏.
      </div>
    </noscript>
  </body>
</html>
